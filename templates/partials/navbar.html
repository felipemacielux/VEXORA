{% load static %}
<nav class="nav">
    <a class="brand" href="{% url 'homepage' %}">
        <div class="brand-logo">
            <img src="{% static 'branding/vexora-mark.svg' %}" alt="{{ PLATFORM_NAME }}" class="logo-img">
        </div>
        <div class="brand-text">
            <span class="brand-name">{{ PLATFORM_NAME }}</span>
            <span class="brand-tagline">Analytics Platform</span>
        </div>
    </a>
    
    <div class="nav-actions">
        <a href="{% url 'dashboards:list' %}" style="text-decoration:none;color:var(--brand-muted);font-weight:500;">Dashboards</a>
        
        {% if user.is_authenticated %}
            <div class="user-info">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>{{ user.username }}</span>
            </div>
            <a href="{% url 'accounts:logout' %}" class="nav-btn outline">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16,17 21,12 16,7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Sair
            </a>
        {% else %}
            <a href="{% url 'accounts:login' %}" class="nav-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                Entrar
            </a>
        {% endif %}
    </div>
</nav>
