services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

  # Serviço separado apenas para migrações
  migrate:
    build: .
    command: >
      bash -c "
        sleep 10
        python manage.py migrate
      "
    working_dir: /app
    env_file: .env
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vexora
      POSTGRES_USER: vexora_user
      POSTGRES_PASSWORD: vexora_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

volumes:
  pgdata: